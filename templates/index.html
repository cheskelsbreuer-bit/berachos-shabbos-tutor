<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap to Learn — Gemara, Tanya, Chumash</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body data-lang="en" data-font="medium">
  <header class="topbar">
    <button id="home-btn" class="topbar-btn" aria-label="Home">🏠</button>
    <h1 id="topbar-title" class="topbar-title">Tap to Learn</h1>
    <div class="topbar-spacer"></div>
    <button id="font-btn" class="topbar-btn" aria-label="Font size">A+</button>
    <button id="lang-btn" class="topbar-btn" aria-label="Language">🌐</button>
    <button id="feedback-btn" class="topbar-btn" aria-label="Feedback">💬</button>
  </header>

  <main id="main">
    <!-- Screen 1: Pick sefer type -->
    <section id="screen-type" class="screen active">
      <h2 class="screen-title" data-i18n="pick_type">What do you want to learn?</h2>
      <div class="big-grid">
        <button class="big-tile" data-type="gemara"><span class="emoji">📚</span><span data-i18n="t_gemara">Gemara</span></button>
        <button class="big-tile" data-type="chumash"><span class="emoji">📖</span><span data-i18n="t_chumash">Chumash</span></button>
        <button class="big-tile" data-type="tanya"><span class="emoji">✡️</span><span data-i18n="t_tanya">Tanya</span></button>
        <button class="big-tile" data-type="mishnayos"><span class="emoji">📜</span><span data-i18n="t_mishnayos">Mishnayos</span></button>
      </div>
    </section>

    <!-- Screen 2: Pick masechta / sefer -->
    <section id="screen-sefer" class="screen">
      <h2 class="screen-title" id="sefer-title"></h2>
      <div class="sefer-grid" id="sefer-grid"></div>
      <button class="back" data-back="screen-type" data-i18n="back">← Back</button>
    </section>

    <!-- Screen 3: Pick daf / chapter -->
    <section id="screen-page" class="screen">
      <h2 class="screen-title" id="page-title"></h2>
      <div class="page-grid" id="page-grid"></div>
      <button class="back" data-back="screen-sefer" data-i18n="back">← Back</button>
    </section>

    <!-- Screen 4: Read -->
    <section id="screen-read" class="screen">
      <div class="read-header">
        <button class="back" data-back="screen-page" data-i18n="back">← Back</button>
        <h2 class="read-title" id="read-title"></h2>
        <a id="torahanytime" class="ta-btn" target="_blank" rel="noopener">🎧</a>
      </div>
      <div class="read-tip" data-i18n="tap_hint">👆 Tap any Hebrew word for a real dictionary translation</div>
      <div id="read-body" class="read-body">
        <div class="loading" data-i18n="loading">Loading authoritative text from Sefaria…</div>
      </div>
      <div class="read-nav" id="read-nav"></div>
    </section>
  </main>

  <!-- Word popup -->
  <div id="word-popup" class="popup hidden"></div>

  <!-- Feedback modal -->
  <div id="feedback-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 data-i18n="feedback">Feedback</h3>
        <button id="feedback-close" class="close">×</button>
      </div>
      <textarea id="feedback-text" rows="6" placeholder="Bug? Idea? Something missing? Tell me."></textarea>
      <button id="feedback-send" class="primary" data-i18n="send">Send</button>
    </div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/sefaria.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
